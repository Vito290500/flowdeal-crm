services:
  db:
    image: postgres:16
    container_name: flowdeal_db
    restart: always
    environment:
      POSTGRES_DB: flowdeal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: flowdeal1234
    ports:
      - "5432:5432"
    volumes:
      - flowdeal_pgdata:/var/lib/postgresql/data

volumes:
  flowdeal_pgdata: